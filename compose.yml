services:
  bcc-canteen:
    image: syafa/worku:latest
    container_name: worku
    restart: always
    environment:
      LIMITER_MAX: ${LIMITER_MAX}
      LIMITER_EXPIRATION_MINUTES: ${LIMITER_EXPIRATION_MINUTES}
      BODY_LIMIT_MB: ${BODY_LIMIT_MB}
      APP_PORT: ${APP_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_ADDRESS: ${REDIS_ADDRESS}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_EXPIRATION: ${REDIS_EXPIRATION}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRED_DAYS: ${JWT_EXPIRED_DAYS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_CLIENT_ID: ${MIDTRANS_CLIENT_ID}
      MIDTRANS_CLIENT_SECRET: ${MIDTRANS_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_FAST_TEXT_MODEL: ${OPENAI_FAST_TEXT_MODEL}
      OPENAI_COMPREHENSIVE_TEXT_MODEL: ${OPENAI_COMPREHENSIVE_TEXT_MODEL}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL}
      OPENAI_FILE_EXPIRY_SECONDS: ${OPENAI_FILE_EXPIRY_SECONDS}
      S3_URL: ${S3_URL}
      S3_ACCOUNT_ID: ${S3_ACCOUNT_ID}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_ACCESS_KEY_SECRET: ${S3_ACCESS_KEY_SECRET}
    ports:
      - "8080:${APP_PORT}"
